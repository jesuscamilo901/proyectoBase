<div class="app-background">
  <div class="glass-panel">
    
    <svg class="glowing-line" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow-effect">
          <feGaussianBlur stdDeviation="3.5" result="coloredBlur"/>
          <feMerge>
            <feMergeNode in="coloredBlur"/>
            <feMergeNode in="SourceGraphic"/>
          </feMerge>
        </filter>
      </defs>
      <path d="M -10 280 Q 150 110, 250 110 L 3000 110" 
            fill="none" 
            stroke="rgba(255, 255, 255, 0.85)" 
            stroke-width="2" 
            filter="url(#glow-effect)" />
    </svg>

    <div class="logo-box" routerLink="/" style="cursor: pointer;">
      <img src="/images/logoRest.png" alt="Delicias Marinas Logo" class="logo-img">
    </div>

    <header class="top-nav">
      <nav class="nav-links">
        <a routerLink="/menu" routerLinkActive="active">Menu</a>
        <a routerLink="/contacto" routerLinkActive="active">Contacto</a>
      </nav>
      <div class="company-name">Nombre Empresa</div>
    </header>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>
  </div>
</div>
